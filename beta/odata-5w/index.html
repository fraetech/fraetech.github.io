<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Carte des modifications mensuelles des installations radioélectriques en France à partir des données ANFR." />
  <meta name="theme-color" content="#2c3e50" />
  <title>ANFR Mensu — Diff mensuel</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

<!-- Chargement -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p>Initialisation…</p>
</div>

<!-- Carte -->
<div id="map"></div>

<!-- Bouton filtres -->
<button id="btn-filtres" onclick="toggleFiltres()">
  ⚙ Filtres <span class="count-badge">0</span>
</button>

<!-- Panneau filtres -->
<div id="panel-filtres">
  <h3>Filtres</h3>

  <div class="filter-group">
    <div class="filter-group-title">Type d'action</div>
    <div id="filter-types"></div>
  </div>

  <div class="filter-group">
    <div class="filter-group-title">Système / Technologie</div>
    <div id="filter-sys" style="max-height:200px;overflow-y:auto"></div>
  </div>

  <button id="btn-filtres-reset" onclick="resetFilters()">Réinitialiser les filtres</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script src="./js/map.js"></script>
</body>
</html>
